<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkout | Pickle & Platter</title>

  <link rel="stylesheet" href="style.css" />

  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Playfair+Display:wght@500;600;700&display=swap"
    rel="stylesheet">
</head>

<body>

  <div id="header"></div>

  <section class="checkout-page">

    <div class="checkout-left">

      <h1>Checkout</h1>

      <form class="checkout-form" id="checkout-form">

        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="customer-name" required>
        </div>

        <div class="form-group">
          <label>Phone Number</label>
          <input type="tel" id="customer-phone" required>
        </div>

        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="customer-email" required>
        </div>

        <div class="form-group">
          <label>Delivery Address</label>
          <textarea id="customer-address" rows="4" required></textarea>
        </div>

        <div class="form-row">

          <div class="form-group">
            <label>City</label>
            <input type="text" id="customer-city" required>
          </div>

          <div class="form-group">
            <label>Pincode</label>
            <input type="text" id="customer-pincode" required>
          </div>

        </div>

        <div class="payment-box">

          <h3>Payment Method</h3>

          <label class="payment-option">
            <input type="radio" name="payment" checked>
            Cash On Delivery
          </label>

          <label class="payment-option">
            <input type="radio" name="payment">
            Razorpay (Coming Soon)
          </label>

        </div>

        <button type="submit" class="place-order-btn">
          Place Order
        </button>

      </form>

    </div>

    <div class="checkout-right">

      <div class="order-summary">

        <h2>Your Order</h2>

        <div id="checkout-items"></div>

        <div class="summary-total">
          <span>Total</span>
          <strong id="checkout-total">₹0</strong>
        </div>

      </div>

    </div>

  </section>

  <div id="footer"></div>

  <script src="script.js"></script>

</body>

</html>
