<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/jpeg" href="images/Pickle_&_Platter_Logo_1.jpg" />
  <title>Checkout | Pickle & Platter</title>

  <link rel="stylesheet" href="style.css" />

  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Playfair+Display:wght@500;600;700&display=swap"
    rel="stylesheet">
</head>

<body>

  <div id="header"></div>

  <section class="checkout-page">

    <div class="checkout-left">

      <h1>Checkout</h1>

      <form class="checkout-form" id="checkout-form">

        <div class="form-group">
          <label>Full Name</label>

          <input type="text" id="customer-name" required minlength="3" maxlength="50" pattern="[A-Za-z ]+"
            title="Only letters and spaces allowed">
        </div>

        <div class="form-group">
          <label>Phone Number</label>

          <input type="tel" id="customer-phone" required pattern="[6-9]{1}[0-9]{9}" maxlength="10" inputmode="numeric"
            title="Enter valid 10-digit Indian mobile number">
        </div>

        <div class="form-group">
          <label>Email Address</label>

          <input type="email" id="customer-email" required maxlength="100" title="Enter valid email address">
        </div>

        <div class="form-group">
          <label>Delivery Address</label>

          <textarea id="customer-address" rows="4" required minlength="10" maxlength="300"
            title="Address should be at least 10 characters"></textarea>
        </div>

        <div class="form-row">

          <div class="form-group">
            <label>City</label>

            <input type="text" id="customer-city" required minlength="2" maxlength="50" pattern="[A-Za-z ]+"
              title="Only letters and spaces allowed">
          </div>

          <div class="form-group">
            <label>Pincode</label>

            <input type="text" id="customer-pincode" required pattern="[1-9][0-9]{5}" maxlength="6" inputmode="numeric"
              title="Enter valid 6-digit Indian pincode">
          </div>

        </div>

        <div class="payment-box">

          <h3>Payment Method</h3>

          <label class="payment-option">
            <input type="radio" name="payment" checked>
            Cash On Delivery
          </label>

          <label class="payment-option inactive-payment">
            <input type="radio" name="payment" disabled>
            Online Payment (Coming Soon)
          </label>

        </div>

        <button type="submit" class="place-order-btn">
          Place Order
        </button>

      </form>

    </div>

    <div class="checkout-right">

      <div class="order-summary">

        <h2>Your Order</h2>

        <div id="checkout-items"></div>

        <div class="summary-total">
          <span>Total</span>
          <strong id="checkout-total">₹0</strong>
        </div>

      </div>

    </div>

  </section>

  <div id="footer"></div>

  <script src="script.js"></script>

</body>

</html>
